<!DOCTYPE html>
<html>

<head>

<title>Admin Dashboard</title>

<style>

body{
font-family:Arial;
margin:0;
background:#b7bec9;
}

.header{
background:#1877f2;
color:rgb(228, 212, 212);
padding:20px;
font-size:22px;
font-weight:bold;
display:flex;
justify-content:space-between;
align-items:center;
}

.logout{
background:rgb(245, 217, 217);
color:#1877f2;
border:none;
padding:8px 14px;
border-radius:6px;
cursor:pointer;
}

.container{
padding:30px;
}

.card{
background:rgb(129, 127, 127);
padding:20px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
margin-bottom:20px;
}

.title{
font-size:18px;
font-weight:bold;
margin-bottom:15px;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:10px;
border-bottom:1px solid #ddd;
text-align:left;
}

textarea{
width:100%;
height:120px;
padding:10px;
border-radius:6px;
border:1px solid #ccc;
margin-top:10px;
}

input{
width:100%;
padding:10px;
margin-bottom:10px;
border-radius:6px;
border:1px solid #ccc;
}

button{
padding:12px 20px;
background:#1877f2;
border:none;
color:rgb(212, 203, 203);
border-radius:6px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="header">
Admin Dashboard
<button class="logout" onclick="logout()">Logout</button>
</div>

<div class="container">

<div class="card">

<div class="title">User Activity</div>

<table>

<tr>
<th>Date</th>
<th>Email</th>
<th>Status</th>
</tr>

<tr>
<td>---</td>
<td>No activity yet</td>
<td>---</td>
</tr>

</table>

</div>

<div class="card">

<div class="title">Send Email</div>

<input id="userEmail" placeholder="User Email">

<textarea id="message" placeholder="Write your message here"></textarea>

<button onclick="sendEmail()">Send Email</button>

</div>

</div>

<script>

async function logout(){

await fetch("/api/auth/admin-logout",{
method:"POST",
credentials:"include"
})

window.location.href="admin-login.html"

}

async function sendEmail(){

try{

const email=document.getElementById("userEmail").value;
const message=document.getElementById("message").value;

if(!email){
alert("Please enter a user email");
return;
}

const response=await fetch("http://localhost:3000/api/email/send-login-email",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
email:email,
message:message
})

});

const data=await response.json();

if(data.success){

alert("Email sent successfully");

}else{

alert(data.message || "Email failed");

}

}catch(error){

console.error(error);
alert("Server connection failed");

}

}

</script>

</body>

</html>
