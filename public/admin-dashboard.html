<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Dashboard</title>

<style>

body{
font-family:Segoe UI;
margin:0;
background:#f0f2f5;
}

/* HEADER */

.header{
background:#1877f2;
color:white;
padding:18px;
font-size:20px;
font-weight:bold;
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
}

.logout{
background:white;
color:#1877f2;
border:none;
padding:8px 16px;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

/* CONTAINER */

.container{
max-width:1000px;
margin:auto;
padding:20px;
}

/* CARDS */

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
margin-bottom:20px;
}

.title{
font-size:18px;
font-weight:bold;
margin-bottom:15px;
}

/* TABLE */

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:10px;
border-bottom:1px solid #ddd;
text-align:left;
font-size:14px;
}

/* FORM */

textarea{
width:100%;
height:120px;
padding:10px;
border-radius:6px;
border:1px solid #ccc;
margin-top:10px;
font-size:14px;
}

input{
width:100%;
padding:10px;
margin-bottom:10px;
border-radius:6px;
border:1px solid #ccc;
font-size:14px;
}

button{
padding:12px 20px;
background:#1877f2;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

/* MOBILE */

@media(max-width:600px){

.header{
font-size:18px;
}

th,td{
font-size:12px;
}

}

</style>

</head>

<body>

<div class="header">
Admin Dashboard
<button class="logout" onclick="logout()">Logout</button>
</div>

<div class="container">

<div class="card">

<div class="title">User Activity</div>

<table>

<tr>
<th>Date</th>
<th>Email</th>
<th>Status</th>
</tr>

<tr>
<td>---</td>
<td>No activity yet</td>
<td>---</td>
</tr>

</table>

</div>

<div class="card">

<div class="title">Send Email</div>

<input id="userEmail" placeholder="User Email">

<textarea id="message" placeholder="Write your message here"></textarea>

<button onclick="sendEmail()">Send Email</button>

</div>

</div>

<script>

async function logout(){

await fetch("/api/auth/admin-logout",{
method:"POST",
credentials:"include"
})

window.location.href="admin-login.html"

}

async function sendEmail(){

try{

const email=document.getElementById("userEmail").value;
const message=document.getElementById("message").value;

if(!email){
alert("Please enter a user email");
return;
}

const response=await fetch("/api/email/send-login-email",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
email:email,
message:message
})

});

const data=await response.json();

if(data.success){

alert("Email sent successfully");

}else{

alert(data.message || "Email failed");

}

}catch(error){

console.error(error);
alert("Server connection failed");

}

}

</script>

</body>
</html>
