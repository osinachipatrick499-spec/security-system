<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Dashboard</title>

<style>

body{
font-family:Segoe UI;
margin:0;
background:#f0f2f5;
}

.header{
background:#1877f2;
color:white;
padding:18px 25px;
font-size:20px;
font-weight:bold;
display:flex;
justify-content:space-between;
align-items:center;
}

.logout{
background:white;
color:#1877f2;
border:none;
padding:8px 16px;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

.container{
max-width:1100px;
margin:auto;
padding:25px;
}

.card{
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 6px 20px rgba(0,0,0,0.08);
margin-bottom:20px;
}

.title{
font-size:18px;
font-weight:bold;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin-bottom:12px;
border-radius:6px;
border:1px solid #bdabab;
font-size:14px;
}

button{
padding:12px 20px;
background:#1877f2;
border:none;
color:rgb(231, 199, 199);
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

.status{
margin-top:15px;
font-size:14px;
}

.success{
color:green;
}

.error{
color:red;
}

</style>

</head>

<body>

<div class="header">

Admin Dashboard 💀

<button class="logout" onclick="logout()">Logout</button>

</div>

<div class="container">

<div class="card">

<div class="title">Send Login Email</div>

<input id="userEmail" placeholder="User email address">

<button onclick="sendEmail()">Send Login Alert</button>

<div id="status" class="status"></div>

</div>

</div>

<script>

async function logout(){

await fetch("/api/auth/admin-logout",{
method:"POST",
credentials:"include"
})

window.location.href="admin-login.html"

}

async function sendEmail(){

const email=document.getElementById("userEmail").value

const status=document.getElementById("status")

status.innerHTML="Sending..."

const response=await fetch("/api/email/send-login-email",{

method:"POST",

credentials:"include",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
email:email
})

})

const data=await response.json()

if(data.success){

status.innerHTML='<span class="success">✔ Email sent successfully</span>'

}else{

status.innerHTML='<span class="error">✖ '+data.message+'</span>'

}

}

</script>

</body>
</html>
